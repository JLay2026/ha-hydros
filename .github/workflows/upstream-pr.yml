# Auto-open upstream PR when an `upstream/*` branch merges to fork main
#
# Triggered by: pull_request_target (closed event), filtered to merged=true
# and head branch matching `upstream/**`.
#
# Authorship: uses UPSTREAM_PR_TOKEN secret (a fine-grained PAT owned by
# JLay2026, scoped to Bitf1ip/ha-hydros with pull_requests:write +
# contents:read). This ensures the upstream PR is attributed to JLay2026,
# not github-actions[bot] or any service account.
#
# See CONTRIBUTING.md for the PAT setup procedure.
#
# If UPSTREAM_PR_TOKEN is not configured, the workflow fails loudly so
# the operator knows to set it up before relying on the automation.

name: Auto-open upstream PR

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write       # to re-push the branch if it was auto-deleted on merge
  pull-requests: read   # to read the merged PR details

jobs:
  open-upstream-pr:
    name: Open upstream PR for merged upstream/* branch
    runs-on: ubuntu-latest
    # Only run when the PR was merged AND the head branch starts with upstream/
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'upstream/')

    steps:
      - name: Verify UPSTREAM_PR_TOKEN is configured
        env:
          UPSTREAM_PR_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
        run: |
          if [ -z "$UPSTREAM_PR_TOKEN" ]; then
            echo "::error::UPSTREAM_PR_TOKEN secret is not configured."
            echo "::error::Cannot open upstream PR without a JLay2026-owned PAT."
            echo "::error::See CONTRIBUTING.md → 'One-time PAT setup' for instructions."
            exit 1
          fi

      - name: Checkout fork (at merge commit)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-push branch (in case it was auto-deleted on merge)
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          # The merge commit is the squash-merged version on main, but the
          # upstream PR should reflect the work as one cohesive change.
          # We push the merge_commit_sha to a same-named branch so upstream
          # sees the squashed change with the original PR title/body.
          
          # If the original branch still exists on the fork (auto-delete
          # disabled), GitHub treats this as a no-op. If it was deleted,
          # this re-creates it pointing at the merge commit.
          git push origin "$MERGE_SHA:refs/heads/$BRANCH" --force-with-lease || \
            git push origin "$MERGE_SHA:refs/heads/$BRANCH"

      - name: Open upstream PR (authored as JLay2026)
        env:
          # CRITICAL: use the PAT, not GITHUB_TOKEN, so the PR author is JLay2026
          GH_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          FORK_PR_NUMBER: ${{ github.event.pull_request.number }}
          FORK_PR_TITLE: ${{ github.event.pull_request.title }}
          FORK_PR_BODY: ${{ github.event.pull_request.body }}
          FORK_PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Build the upstream PR body: includes the fork PR's body verbatim,
          # plus a header noting the provenance and a footer linking back.
          UPSTREAM_BODY=$(cat <<EOF
          > **Provenance:** mirrors [JLay2026/ha-hydros#${FORK_PR_NUMBER}](${FORK_PR_URL}), which landed in the v0.4.x hardening line for production use in the [Workshop dashboard project](https://github.com/JLay2026/HA-dashboard).

          ---

          ${FORK_PR_BODY}

          ---

          Opened automatically by [.github/workflows/upstream-pr.yml](https://github.com/JLay2026/ha-hydros/blob/main/.github/workflows/upstream-pr.yml) on merge of the fork-side PR. Authored by @JLay2026 (PR creation authenticated via fine-grained PAT scoped to this repo).
          EOF
          )

          gh pr create \
            --repo Bitf1ip/ha-hydros \
            --base main \
            --head "JLay2026:${BRANCH}" \
            --title "${FORK_PR_TITLE}" \
            --body "${UPSTREAM_BODY}"

      - name: Comment on fork PR with upstream PR link
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORK_PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          # Find the just-opened upstream PR
          UPSTREAM_PR_URL=$(GH_TOKEN="${{ secrets.UPSTREAM_PR_TOKEN }}" gh pr list \
            --repo Bitf1ip/ha-hydros \
            --head "JLay2026:${BRANCH}" \
            --json url --jq '.[0].url')

          if [ -n "$UPSTREAM_PR_URL" ]; then
            gh pr comment "$FORK_PR_NUMBER" --body "🔗 Upstream PR opened: $UPSTREAM_PR_URL"
          else
            echo "::warning::Could not find the upstream PR to link back"
          fi
