# Auto-open upstream PR — currently in STAND-BY mode.
#
# Previous behavior: on merge of an `upstream/*` branch, this workflow opened a
# cross-repo PR to `Bitf1ip/ha-hydros` using a fine-grained Personal Access
# Token stored as the `UPSTREAM_PR_TOKEN` secret. Authorship of the upstream
# PR was attributed to the PAT owner (JLay2026), not `github-actions[bot]`.
#
# Why disabled: fine-grained PATs targeting a repo require the repo owner to
# opt in to fine-grained PAT access for their account/org. Bitf1ip has not.
# Without that opt-in, the only alternative is a classic PAT with `public_repo`
# scope, whose blast radius (write to every public repo the user collaborates
# on) is higher than the value of automating one PR per merge.
#
# Decision: upstream PRs are opened MANUALLY going forward. See
# CONTRIBUTING.md → "Manual upstream PR submission" for the workflow.
#
# To re-enable auto-PR mode later:
#   1. Configure `UPSTREAM_PR_TOKEN` secret (either a classic PAT with
#      public_repo scope, or a fine-grained PAT if Bitf1ip opts in).
#   2. Revert the silenced guard step below: restore the original `exit 1`
#      and remove the manual-mode `::notice::` lines.
#   3. Update CONTRIBUTING.md to reflect the re-enabled automation.
#
# This file is kept in place rather than deleted so the revert path is
# discoverable and the git history of the original workflow is preserved.

name: Auto-open upstream PR (disabled — manual mode)

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write       # to re-push the branch if it was auto-deleted on merge
  pull-requests: read   # to read the merged PR details

jobs:
  open-upstream-pr:
    name: Manual mode — skip auto-PR for merged upstream/* branch
    runs-on: ubuntu-latest
    # Only run when the PR was merged AND the head branch starts with upstream/
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'upstream/')

    steps:
      - name: Manual mode — emit notice and exit cleanly
        env:
          UPSTREAM_PR_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
          FORK_PR_URL: ${{ github.event.pull_request.html_url }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          # Stand-by mode: UPSTREAM_PR_TOKEN is intentionally not configured.
          # See file header for rationale and the revert procedure.
          if [ -z "$UPSTREAM_PR_TOKEN" ]; then
            echo "::notice::Manual upstream-PR mode active. See CONTRIBUTING.md → 'Manual upstream PR submission'."
            echo "::notice::Branch merged: $BRANCH"
            echo "::notice::Fork PR: $FORK_PR_URL"
            echo "::notice::Operator action: open the upstream PR manually against Bitf1ip/ha-hydros."
            exit 0
          fi
          # If the secret IS configured, still skip (rather than fall through
          # to the original behavior) and prompt the operator to follow the
          # revert procedure above. This avoids accidentally opening upstream
          # PRs through a token that wasn't audited against the new flow.
          echo "::warning::UPSTREAM_PR_TOKEN is set but auto-PR has been intentionally disabled."
          echo "::warning::Restore the original guard logic and review the workflow before re-enabling."
          exit 0
